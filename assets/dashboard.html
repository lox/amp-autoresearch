<!DOCTYPE html>
<!-- amp-autoresearch dashboard. Data contract shared with pi-autoresearch
     (https://github.com/davebcn87/pi-autoresearch, MIT): fetches ./autoresearch.jsonl,
     listens for `jsonl-updated` on /events. Markup and styling are original. -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>__AUTORESEARCH_TITLE__</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>" />
<style>
  :root {
    --bg: #0a0d0b;
    --panel: #0f1512;
    --panel-2: #131b17;
    --line: #1f2b24;
    --text: #cfe0d4;
    --muted: #6e8377;
    --faint: #46564d;
    --phosphor: #46e08a;
    --phosphor-dim: #2c8f58;
    --amber: #e0b346;
    --red: #e06055;
    --blue: #5aa7d6;
    --mono: "Berkeley Mono", "JetBrains Mono", "IBM Plex Mono", "SF Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    padding: 28px clamp(16px, 4vw, 48px) 64px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .session-meta { color: var(--muted); font-size: 12px; }
  .live {
    margin-left: auto; display: inline-flex; align-items: center; gap: 7px;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--line); border-radius: 999px; padding: 4px 12px;
  }
  .live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); }
  .live.on { color: var(--phosphor); border-color: var(--phosphor-dim); }
  .live.on .dot { background: var(--phosphor); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.25; } }
  @media (prefers-reduced-motion: reduce) { .live.on .dot { animation: none; } }

  /* ── Stat strip ── */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin: 22px 0 14px;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px 16px 10px;
  }
  .stat .label { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .stat .value { font-size: 21px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .stat .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .unit { font-size: 0.85em; color: var(--muted); font-weight: 400; margin-left: 3px; }
  .stat .value .unit { font-size: 12px; }
  .stat.good .value { color: var(--phosphor); }
  .stat.warn .value { color: var(--amber); }

  /* ── Scope (chart) ── */
  .scope {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 18px 18px 10px; margin-bottom: 18px; overflow: hidden;
  }
  .scope::after { /* faint scanlines: the instrument look, nearly subliminal */
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(120, 255, 180, 0.012) 3px 4px);
  }
  .scope svg { display: block; width: 100%; height: 280px; }
  .scope .legend {
    display: flex; gap: 18px; padding: 6px 4px 4px; font-size: 11px; color: var(--muted);
    flex-wrap: wrap;
  }
  .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: -1px; }
  .legend .l-keep i { background: var(--phosphor); }
  .legend .l-discard i { background: var(--faint); }
  .legend .l-crash i { background: var(--red); }
  .legend .l-base i, .legend .l-best i { width: 14px; height: 0; border-radius: 0; vertical-align: 2px; }
  .legend .l-base i { border-top: 1px dashed var(--amber); }
  .legend .l-best i { border-top: 1px dashed var(--phosphor-dim); }
  .tooltip {
    position: absolute; display: none; pointer-events: none; z-index: 10;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 11px; font-size: 11px; max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .tooltip b { color: var(--phosphor); }
  .tooltip .t-desc { color: var(--muted); margin-top: 3px; }

  /* ── Runs table ── */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); font-weight: 500; padding: 8px 10px; border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  th.num, td.num { text-align: right; }
  tbody tr.run { border-bottom: 1px solid rgba(31, 43, 36, 0.55); cursor: pointer; }
  tbody tr.run:hover { background: var(--panel); }
  tbody tr.run.best-row { background: rgba(70, 224, 138, 0.05); }
  tbody tr.run.best-row:hover { background: rgba(70, 224, 138, 0.09); }
  td { padding: 8px 10px; vertical-align: baseline; font-variant-numeric: tabular-nums; }
  td.run-id { color: var(--muted); width: 64px; white-space: nowrap; }
  td.num, td.commit { white-space: nowrap; }
  .badge {
    display: inline-block; font-size: 10px; letter-spacing: 0.08em; padding: 1px 8px 2px;
    border-radius: 999px; border: 1px solid transparent;
  }
  .badge.keep { color: var(--phosphor); border-color: rgba(70, 224, 138, 0.35); background: rgba(70, 224, 138, 0.08); }
  .badge.discard { color: var(--muted); border-color: var(--line); }
  .badge.crash { color: var(--red); border-color: rgba(224, 96, 85, 0.4); background: rgba(224, 96, 85, 0.08); }
  .badge.checks_failed { color: var(--amber); border-color: rgba(224, 179, 70, 0.4); background: rgba(224, 179, 70, 0.08); }
  td.delta.neg { color: var(--phosphor); }
  td.delta.pos { color: var(--red); }
  td.delta.zero, td.conf.dim { color: var(--faint); }
  td.commit { color: var(--blue); }
  td.desc { color: var(--text); max-width: 520px; }
  td .caret { color: var(--faint); margin-right: 6px; display: inline-block; transition: transform 0.12s ease; }
  tr.run.open .caret { transform: rotate(90deg); }
  tr.detail td {
    padding: 4px 10px 14px 66px; color: var(--muted); font-size: 12px;
    border-bottom: 1px solid rgba(31, 43, 36, 0.55); background: var(--panel);
  }
  tr.detail dl { display: grid; grid-template-columns: max-content 1fr; gap: 3px 16px; }
  tr.detail dt { color: var(--faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.12em; padding-top: 2px; }
  tr.detail dd { white-space: pre-wrap; }
  .secondary-metrics { color: var(--muted); font-size: 11px; }

  /* ── Empty state ── */
  .empty {
    border: 1px dashed var(--line); border-radius: 8px; padding: 48px 24px;
    text-align: center; color: var(--muted); margin-top: 18px;
  }
  .empty .glyph { font-size: 28px; display: block; margin-bottom: 10px; }

  footer { margin-top: 28px; color: var(--faint); font-size: 11px; display: flex; gap: 16px; flex-wrap: wrap; }
  footer a { color: var(--muted); }

  @media (max-width: 720px) {
    body { font-size: 12px; padding-top: 18px; }
    .desc { max-width: none; }
    th.hide-sm, td.hide-sm { display: none; }
  }
</style>
</head>
<body>
  <header>
    <h1 id="title">__AUTORESEARCH_TITLE__</h1>
    <span class="session-meta" id="meta"></span>
    <span class="live" id="live"><span class="dot"></span><span id="live-text">connecting</span></span>
  </header>

  <div class="stats" id="stats"></div>

  <div class="scope" id="scope" hidden>
    <svg id="chart" preserveAspectRatio="none"></svg>
    <div class="legend">
      <span class="l-keep"><i></i>keep</span>
      <span class="l-discard"><i></i>discard</span>
      <span class="l-crash"><i></i>crash / checks failed</span>
      <span class="l-base"><i></i>baseline</span>
      <span class="l-best"><i></i>best</span>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div id="table-wrap"></div>
  <div class="empty" id="empty" hidden>
    <span class="glyph">🔬</span>
    No experiments logged yet.<br />
    The table fills in as soon as the agent calls <b>log_experiment</b>.
  </div>

  <footer>
    <span>source: <a href="autoresearch.jsonl">autoresearch.jsonl</a></span>
    <span id="updated"></span>
  </footer>

<script>
'use strict'

// ── Parsing (mirrors the plugin's reconstruction, segment-aware) ──
function parseLog(text) {
  const state = {
    name: null, metricName: 'metric', metricUnit: '', direction: 'lower',
    segment: 0, runs: [],
  }
  let segment = 0
  for (const line of text.split('\n')) {
    if (!line.trim()) continue
    let e
    try { e = JSON.parse(line) } catch { continue }
    if (!e || typeof e !== 'object') continue
    if (e.type === 'config') {
      if (typeof e.name === 'string') state.name = e.name
      if (typeof e.metricName === 'string') state.metricName = e.metricName
      if (typeof e.metricUnit === 'string') state.metricUnit = e.metricUnit
      state.direction = e.bestDirection === 'higher' ? 'higher' : 'lower'
      if (state.runs.length > 0) segment++
      state.segment = segment
      continue
    }
    if (typeof e.run !== 'number') continue
    state.runs.push({
      run: e.run,
      commit: typeof e.commit === 'string' ? e.commit : '',
      metric: typeof e.metric === 'number' ? e.metric : 0,
      metrics: e.metrics && typeof e.metrics === 'object' ? e.metrics : {},
      status: ['discard', 'crash', 'checks_failed'].includes(e.status) ? e.status : 'keep',
      description: typeof e.description === 'string' ? e.description : '',
      timestamp: typeof e.timestamp === 'number' ? e.timestamp : 0,
      confidence: typeof e.confidence === 'number' ? e.confidence : null,
      asi: e.asi && typeof e.asi === 'object' ? e.asi : null,
      segment,
    })
  }
  return state
}

// ── Formatting: adaptive precision so small floats stay meaningful ──
function fmt(v) {
  if (v === null || v === undefined || !isFinite(v)) return '—'
  if (Number.isInteger(v)) return v.toLocaleString('en-US')
  const a = Math.abs(v)
  if (a >= 1000) return v.toLocaleString('en-US', { maximumFractionDigits: 0 })
  if (a >= 1) return v.toLocaleString('en-US', { maximumFractionDigits: 2 })
  return v.toPrecision(4).replace(/\.?0+$/, '')
}
function fmtUnit(v, unit) {
  return fmt(v) + (unit ? `<span class="unit">${esc(unit)}</span>` : '')
}
function pct(v, base) {
  if (base === null || base === 0 || v === base) return null
  return ((v - base) / base) * 100
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c])
}
function timeago(ts) {
  if (!ts) return ''
  const s = Math.floor((Date.now() - ts) / 1000)
  if (s < 60) return `${s}s ago`
  if (s < 3600) return `${Math.floor(s / 60)}m ago`
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`
  return new Date(ts).toLocaleString()
}

// ── Derivations over the current segment ──
function derive(state) {
  const runs = state.runs.filter((r) => r.segment === state.segment)
  const baseline = runs.length ? runs[0].metric : null
  const kept = runs.filter((r) => r.status === 'keep' && r.metric !== 0)
  let best = null, bestRun = null
  for (const r of kept) {
    if (best === null || (state.direction === 'lower' ? r.metric < best : r.metric > best)) {
      best = r.metric; bestRun = r.run
    }
  }
  const counts = { keep: 0, discard: 0, crash: 0, checks_failed: 0 }
  for (const r of runs) counts[r.status]++
  const lastConf = [...runs].reverse().find((r) => r.confidence !== null)?.confidence ?? null
  return { runs, baseline, best, bestRun, counts, lastConf }
}

// ── Stats strip ──
function renderStats(state, d) {
  const u = state.metricUnit
  const imp = d.best !== null ? pct(d.best, d.baseline) : null
  const impGood = imp !== null && (state.direction === 'lower' ? imp < 0 : imp > 0)
  const conf = d.lastConf
  const confClass = conf === null ? '' : conf >= 2 ? 'good' : conf >= 1 ? 'warn' : ''
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="label">Baseline</div>
      <div class="value">${fmtUnit(d.baseline, u)}</div>
      <div class="sub">${d.runs.length ? `run #${d.runs[0].run}` : 'no runs yet'}</div></div>
    <div class="stat ${d.best !== null ? 'good' : ''}"><div class="label">Best</div>
      <div class="value">${fmtUnit(d.best, u)}</div>
      <div class="sub">${d.bestRun !== null ? `run #${d.bestRun}` : 'no kept runs yet'}</div></div>
    <div class="stat ${impGood ? 'good' : ''}"><div class="label">Improvement</div>
      <div class="value">${imp === null ? '—' : (imp > 0 ? '+' : '') + imp.toFixed(1) + '%'}</div>
      <div class="sub">vs baseline · ${state.direction} is better</div></div>
    <div class="stat ${confClass}"><div class="label">Confidence</div>
      <div class="value">${conf === null ? '—' : conf.toFixed(1) + '×'}</div>
      <div class="sub">${conf === null ? 'needs 3+ runs' : conf >= 2 ? 'likely real' : conf >= 1 ? 'borderline' : 'within noise'}</div></div>
    <div class="stat"><div class="label">Runs</div>
      <div class="value">${d.runs.length}</div>
      <div class="sub">${d.counts.keep} keep · ${d.counts.discard} discard${d.counts.crash ? ` · ${d.counts.crash} crash` : ''}${d.counts.checks_failed ? ` · ${d.counts.checks_failed} checks` : ''}</div></div>`
}

// ── The scope: a data-fitted trace with reference lines ──
const STATUS_COLOR = {
  keep: 'var(--phosphor)', discard: 'var(--faint)',
  crash: 'var(--red)', checks_failed: 'var(--amber)',
}
function renderChart(state, d) {
  const scope = document.getElementById('scope')
  const svg = document.getElementById('chart')
  const plotted = d.runs.filter((r) => r.metric !== 0 || r.status === 'keep')
  if (plotted.length < 2) { scope.hidden = true; return }
  scope.hidden = false

  const W = 1200, H = 280, padL = 74, padR = 18, padT = 16, padB = 30
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`)
  const values = plotted.map((r) => r.metric)
  const refs = [d.baseline, d.best].filter((v) => v !== null)
  let lo = Math.min(...values, ...refs), hi = Math.max(...values, ...refs)
  if (lo === hi) { lo -= Math.abs(lo) * 0.05 || 1; hi += Math.abs(hi) * 0.05 || 1 }
  const span = hi - lo
  lo -= span * 0.12; hi += span * 0.12
  const x = (i) => padL + (i / Math.max(plotted.length - 1, 1)) * (W - padL - padR)
  const y = (v) => padT + (1 - (v - lo) / (hi - lo)) * (H - padT - padB)

  let g = ''
  // y grid + labels (4 ticks)
  for (let t = 0; t <= 4; t++) {
    const v = lo + ((hi - lo) * t) / 4
    const yy = y(v)
    g += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="var(--line)" stroke-width="1"/>`
    g += `<text x="${padL - 8}" y="${yy + 3.5}" text-anchor="end" font-size="10" fill="var(--muted)" font-family="var(--mono)">${fmt(v)}</text>`
  }
  // reference lines
  if (d.baseline !== null)
    g += `<line x1="${padL}" y1="${y(d.baseline)}" x2="${W - padR}" y2="${y(d.baseline)}" stroke="var(--amber)" stroke-width="1" stroke-dasharray="5 4" opacity="0.7"/>`
  if (d.best !== null)
    g += `<line x1="${padL}" y1="${y(d.best)}" x2="${W - padR}" y2="${y(d.best)}" stroke="var(--phosphor-dim)" stroke-width="1" stroke-dasharray="5 4" opacity="0.8"/>`
  // trace with a soft phosphor glow
  const pts = plotted.map((r, i) => `${x(i)},${y(r.metric)}`).join(' ')
  g += `<polyline points="${pts}" fill="none" stroke="var(--phosphor)" stroke-width="4" opacity="0.14" stroke-linejoin="round"/>`
  g += `<polyline points="${pts}" fill="none" stroke="var(--phosphor)" stroke-width="1.5" opacity="0.85" stroke-linejoin="round"/>`
  // markers
  plotted.forEach((r, i) => {
    g += `<circle cx="${x(i)}" cy="${y(r.metric)}" r="${r.run === d.bestRun ? 5 : 3.5}" fill="${STATUS_COLOR[r.status]}" stroke="var(--bg)" stroke-width="1.5" data-i="${i}"/>`
  })
  // x labels, thinned to ~12
  const step = Math.ceil(plotted.length / 12)
  plotted.forEach((r, i) => {
    if (i % step !== 0 && i !== plotted.length - 1) return
    g += `<text x="${x(i)}" y="${H - 8}" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="var(--mono)">#${r.run}</text>`
  })
  svg.innerHTML = g

  // hover tooltip
  const tip = document.getElementById('tooltip')
  svg.onmousemove = (ev) => {
    const rect = svg.getBoundingClientRect()
    const mx = ((ev.clientX - rect.left) / rect.width) * W
    let bi = 0, bd = Infinity
    plotted.forEach((r, i) => { const dd = Math.abs(x(i) - mx); if (dd < bd) { bd = dd; bi = i } })
    const r = plotted[bi]
    const delta = pct(r.metric, d.baseline)
    tip.innerHTML = `<b>#${r.run}</b> ${esc(r.status)} · ${fmt(r.metric)}${esc(state.metricUnit)}` +
      (delta !== null ? ` (${delta > 0 ? '+' : ''}${delta.toFixed(1)}%)` : '') +
      `<div class="t-desc">${esc(r.description)}</div>`
    tip.style.display = 'block'
    const px = (x(bi) / W) * rect.width
    tip.style.left = Math.min(px + 14, rect.width - tip.offsetWidth - 8) + 'px'
    tip.style.top = (y(r.metric) / H) * rect.height + 14 + 'px'
  }
  svg.onmouseleave = () => { tip.style.display = 'none' }
}

// ── Runs table: newest first, expandable ASI detail ──
const openRuns = new Set()
function renderTable(state, d) {
  const wrap = document.getElementById('table-wrap')
  document.getElementById('empty').hidden = d.runs.length > 0
  if (!d.runs.length) { wrap.innerHTML = ''; return }
  const u = esc(state.metricUnit)
  const rows = [...d.runs].reverse().map((r) => {
    const delta = pct(r.metric, d.baseline)
    const deltaCls = delta === null ? 'zero' : (state.direction === 'lower' ? delta < 0 : delta > 0) ? 'neg' : 'pos'
    const hasDetail = r.asi || Object.keys(r.metrics).length
    const secondary = Object.entries(r.metrics).map(([k, v]) => `${esc(k)}=${fmt(v)}`).join(' · ')
    let detail = ''
    if (hasDetail && openRuns.has(r.run)) {
      const dl = []
      if (secondary) dl.push(`<dt>metrics</dt><dd class="secondary-metrics">${secondary}</dd>`)
      for (const [k, v] of Object.entries(r.asi ?? {}))
        dl.push(`<dt>${esc(k)}</dt><dd>${esc(typeof v === 'string' ? v : JSON.stringify(v))}</dd>`)
      dl.push(`<dt>logged</dt><dd>${timeago(r.timestamp)}</dd>`)
      detail = `<tr class="detail"><td colspan="7"><dl>${dl.join('')}</dl></td></tr>`
    }
    return `
      <tr class="run ${r.run === d.bestRun ? 'best-row' : ''} ${openRuns.has(r.run) ? 'open' : ''}" data-run="${r.run}">
        <td class="run-id">${hasDetail ? '<span class="caret">▸</span>' : '<span class="caret" style="visibility:hidden">▸</span>'}#${r.run}</td>
        <td><span class="badge ${r.status}">${r.status === 'checks_failed' ? 'checks ✗' : r.status}</span></td>
        <td class="num">${fmt(r.metric)}<span class="unit">${u}</span></td>
        <td class="num delta ${deltaCls}">${delta === null ? '—' : (delta > 0 ? '+' : '') + delta.toFixed(1) + '%'}</td>
        <td class="num conf hide-sm ${r.confidence === null ? 'dim' : ''}">${r.confidence === null ? '—' : r.confidence.toFixed(1) + '×'}</td>
        <td class="commit hide-sm">${esc(r.commit)}</td>
        <td class="desc">${esc(r.description)}</td>
      </tr>${detail}`
  })
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>Run</th><th>Status</th><th class="num">${esc(state.metricName)}</th>
        <th class="num">Δ base</th><th class="num hide-sm">Conf</th>
        <th class="hide-sm">Commit</th><th>Description</th>
      </tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>`
  wrap.querySelectorAll('tr.run').forEach((tr) => {
    tr.addEventListener('click', () => {
      const n = Number(tr.dataset.run)
      openRuns.has(n) ? openRuns.delete(n) : openRuns.add(n)
      render(lastState)
    })
  })
}

// ── Orchestration ──
let lastState = null
function render(state) {
  lastState = state
  const d = derive(state)
  if (state.name) { document.getElementById('title').textContent = state.name; document.title = state.name }
  document.getElementById('meta').textContent =
    `${state.metricName}${state.metricUnit ? ` (${state.metricUnit})` : ''} · ${state.direction} is better` +
    (state.segment > 0 ? ` · segment ${state.segment + 1}` : '')
  renderStats(state, d)
  renderChart(state, d)
  renderTable(state, d)
  const last = d.runs.at(-1)
  document.getElementById('updated').textContent = last ? `last run ${timeago(last.timestamp)}` : ''
}

async function refresh() {
  try {
    const res = await fetch('autoresearch.jsonl', { cache: 'no-store' })
    render(parseLog(res.ok ? await res.text() : ''))
  } catch { render(parseLog('')) }
}

function setLive(on, label) {
  const el = document.getElementById('live')
  el.classList.toggle('on', on)
  document.getElementById('live-text').textContent = label
}

function connect() {
  if (typeof EventSource === 'undefined') { setLive(false, 'no live updates'); return }
  const es = new EventSource('/events')
  es.onopen = () => setLive(true, 'live')
  es.addEventListener('jsonl-updated', refresh)
  es.onerror = () => setLive(false, 'reconnecting')
}

refresh()
connect()
setInterval(() => { // keep "ago" labels honest even when idle
  if (lastState) document.getElementById('updated').textContent =
    lastState.runs.length ? `last run ${timeago(lastState.runs.at(-1).timestamp)}` : ''
}, 30_000)
</script>
</body>
</html>
