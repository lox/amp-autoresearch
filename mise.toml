[tools]
bun = "latest"

[tasks.test]
description = "Run unit tests"
run = "bun test"

[tasks.typecheck]
description = "Typecheck with tsc"
run = "bun x tsc --noEmit"

[tasks.check]
description = "Tests + typecheck"
depends = ["test", "typecheck"]

[tasks.fmt]
description = "Format with prettier"
run = "bun x prettier --write autoresearch.ts scripts/*.ts test/*.ts"

[tasks.install]
description = "Install the plugin into ~/.config/amp/plugins"
run = "bun run scripts/plugin-install.ts"

[tasks.uninstall]
description = "Remove the installed plugin"
run = "bun run scripts/plugin-install.ts uninstall"
