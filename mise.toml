[tools]
bun = "latest"

[tasks.test]
description = "Run unit tests"
run = "bun test"

[tasks.typecheck]
description = "Typecheck with tsc"
run = "bun x tsc --noEmit"

[tasks.check]
description = "Tests + typecheck"
depends = ["test", "typecheck"]

[tasks.fmt]
description = "Format with prettier"
run = "bun x prettier --write autoresearch.ts test/*.ts"

[tasks.install]
description = "Symlink the plugin into ~/.config/amp/plugins"
run = [
  "mkdir -p ~/.config/amp/plugins",
  "ln -sf {{config_root}}/autoresearch.ts ~/.config/amp/plugins/amp-autoresearch.ts",
]

[tasks.uninstall]
description = "Remove the plugin symlink"
run = "rm -f ~/.config/amp/plugins/amp-autoresearch.ts"
